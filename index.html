<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawHub - 龙虾聚合站 | AI Agent 产品导航</title>
    <meta name="description" content="ClawHub 是OpenClaw（龙虾）产品的聚合导航站，收录国内外的龙虾产品及AI产品">
    <meta name="keywords" content="OpenClaw, 龙虾, AI Agent, NanoClaw, QClaw, LobsterAI, AI编程">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <!-- Favicon - Lobster Emoji -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css?v=20260313">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        claw: {
                            50: '#fff6f0',
                            100: '#ffebe0',
                            200: '#ffd4bf',
                            300: '#ff9966',
                            400: '#ff8533',
                            500: '#ff6600',
                            600: '#d95500',
                            700: '#b34700',
                            800: '#8c3800',
                            900: '#702d00',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14 sm:h-16">
                <!-- Logo -->
                <div class="flex items-center space-x-2 sm:space-x-3">
                    <span class="text-2xl sm:text-3xl">🦞</span>
                    <div>
                        <h1 class="text-lg sm:text-xl font-bold text-gray-900 dark:text-white">ClawHub</h1>
                        <p class="text-xs text-gray-500 dark:text-gray-400 hidden sm:block">龙虾聚合站</p>
                    </div>
                </div>

                <!-- Search -->
                <div class="flex-1 max-w-md mx-4 sm:mx-8 hidden sm:block">
                    <div class="relative">
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="搜索产品..."
                            class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-claw-500 focus:border-transparent transition"
                        >
                        <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>

                <!-- Right Buttons -->
                <div class="flex items-center gap-1 sm:gap-3">
                    <!-- Skills Button -->
                    <a
                        href="https://clawhub.ai/skills?sort=downloads"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="flex items-center gap-1.5 sm:gap-2 px-2 sm:px-4 py-1.5 sm:py-2 rounded-lg bg-claw-500 hover:bg-claw-600 text-white transition font-medium text-xs sm:text-sm"
                        title="技能市场"
                    >
                        <span>🛠️</span>
                        <span>Skills</span>
                    </a>

                    <!-- Community Button -->
                    <button
                        id="communityBtn"
                        class="flex items-center gap-1.5 sm:gap-2 px-2 sm:px-4 py-1.5 sm:py-2 rounded-lg bg-claw-500 hover:bg-claw-600 text-white transition font-medium text-xs sm:text-sm"
                        title="养虾交流群"
                    >
                        <span>🦞</span>
                        <span>养虾交流群</span>
                    </button>

                    <!-- Theme Toggle -->
                    <button
                        id="themeToggle"
                        class="p-1.5 sm:p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition text-lg sm:text-xl"
                        title="切换主题"
                    >
                        <span class="dark:hidden">🌙</span>
                        <span class="hidden dark:inline">☀️</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Search -->
    <div class="sm:hidden px-3 py-2 bg-white dark:bg-gray-800 border-b dark:border-gray-700">
        <div class="relative">
            <input
                type="text"
                id="mobileSearchInput"
                placeholder="搜索产品..."
                class="w-full pl-9 pr-4 py-2 text-sm rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-claw-500 focus:border-transparent"
            >
            <svg class="absolute left-3 top-2.5 h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
        </div>
    </div>

    <!-- Category Filter -->
    <nav class="bg-white dark:bg-gray-800 border-b dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8">
            <div class="flex items-center space-x-1.5 sm:space-x-2 py-2 sm:py-3 overflow-x-auto" id="categoryTabs">
                <!-- Categories will be rendered here -->
            </div>
        </div>
    </nav>

    <!-- Stats Bar -->
    <div class="bg-claw-500 dark:bg-claw-700 text-white">
        <div class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-2 sm:py-3">
            <div id="statsBar" class="flex items-center justify-center min-h-[20px] sm:min-h-[24px] text-xs sm:text-sm">
                <!-- Content will be rotated by JS -->
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-3 sm:px-6 lg:px-8 py-4 sm:py-8">
        <!-- Products List -->
        <div id="productsGrid" class="space-y-3">
            <!-- Products will be rendered here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <span class="text-6xl mb-4 block">🔍</span>
            <h3 class="text-xl font-semibold text-gray-700 dark:text-gray-300">未找到匹配的产品</h3>
            <p class="text-gray-500 dark:text-gray-400 mt-2">尝试其他关键词或清除筛选条件</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white dark:bg-gray-800 border-t dark:border-gray-700 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="flex flex-col md:flex-row items-center justify-between">
                <div class="flex items-center space-x-2 mb-4 md:mb-0">
                    <span class="text-2xl">🦞</span>
                    <span class="text-gray-600 dark:text-gray-400">ClawHub - 让每个人都能找到合适的龙虾</span>
                </div>
                <div class="flex items-center space-x-6">
                    <a href="https://github.com/openclaw/openclaw" target="_blank" class="text-gray-500 hover:text-claw-500 dark:text-gray-400 dark:hover:text-claw-400 transition">
                        GitHub
                    </a>
                    <a href="https://clawhub.ai" target="_blank" class="text-gray-500 hover:text-claw-500 dark:text-gray-400 dark:hover:text-claw-400 transition">
                        ClawHub
                    </a>
                </div>
            </div>
            <div class="mt-6 pt-6 border-t dark:border-gray-700 text-center text-sm text-gray-500 dark:text-gray-400">
                <p>© 2026 ClawHub. 数据来源于各产品官网及 GitHub，仅供学习参考。</p>
            </div>
        </div>
    </footer>

    <!-- QR Code Modal -->
    <div id="qrModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 max-w-sm mx-4 relative">
            <button id="closeModal" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-2xl">&times;</button>
            <div class="text-center">
                <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-4">🦞 养虾交流群</h3>
                <div class="bg-gray-100 dark:bg-gray-700 rounded-xl p-4 mb-4">
                    <!-- 飞书二维码占位 - 请替换为实际的二维码图片URL -->
                    <div class="w-48 h-48 mx-auto flex items-center justify-center bg-white dark:bg-gray-600 rounded-lg">
                        <img src="images/feishu-qr.png" alt="飞书群二维码" class="w-full h-full object-contain" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="hidden flex-col items-center text-gray-500 dark:text-gray-400">
                            <span class="text-4xl mb-2">📱</span>
                            <span class="text-sm">扫码加入飞书群</span>
                        </div>
                    </div>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400">扫描二维码加入养虾交流群</p>
            </div>
        </div>
    </div>

    <script src="js/api.js?v=20260313"></script>
    <script src="js/app.js?v=20260313"></script>
</body>
</html>
